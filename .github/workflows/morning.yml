name: Morning Quant Lab

on:
  workflow_dispatch:
  schedule:
    # 21:30 UTC = 4:30 PM EST winter / 5:30 PM EDT summer (post-close).
    # Captures today's close so NAV advances same-day, not lagged a day.
    # Run twice for DST coverage; idempotent on the second fire of the same day.
    - cron: "30 21 * * 1-5"
    - cron: "30 20 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: morning
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (runtime deps only — tests run in CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run morning bot
        run: quant-lab morning

      - name: Commit state and dashboard data
        run: |
          git config user.name "quant-lab-bot"
          git config user.email "quant-lab@users.noreply.github.com"
          git add state/ dashboard/data/ data/snapshots/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: morning $(date -u +%Y-%m-%d) state update"
            git push
          else
            echo "No state changes to commit."
          fi

      - name: Deploy dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: run-bot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
