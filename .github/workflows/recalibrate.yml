name: Weekly Recalibration

on:
  workflow_dispatch:
  schedule:
    # Monday 01:00 UTC = Sunday 8 PM ET (winter) / 9 PM ET (summer)
    - cron: "0 1 * * 1"

permissions:
  contents: write

concurrency:
  group: recalibrate
  cancel-in-progress: false

jobs:
  recalibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run weekly backtest recalibration
        run: |
          END_DATE=$(date -u +%Y-%m-%d)
          quant-lab backtest \
            --start 2018-01-01 \
            --end "$END_DATE" \
            --train-years 3 \
            --step-months 12 \
            --no-regime-stress

      - name: Commit recalibration data
        run: |
          git config user.name "quant-lab-bot"
          git config user.email "quant-lab@users.noreply.github.com"
          git add dashboard/data/backtest/
          if ! git diff --cached --quiet; then
            RECAL_DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: weekly recalibration ${RECAL_DATE}"
            git push
          else
            echo "No recalibration changes to commit."
          fi

      - name: Post Discord summary (optional)
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          RECAL_DATE=$(date -u +%Y-%m-%d)
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Weekly recalibration complete for ${RECAL_DATE}. Backtest weights updated.\"}"
