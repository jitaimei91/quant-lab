name: Morning Watchdog

on:
  schedule:
    # Run at 12, 14, 16, 20 UTC on weekdays
    - cron: '0 12,14,16,20 * * 1-5'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check last morning run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -e

          LAST_MORNING_FILE="state/last_morning.json"

          if [ ! -f "$LAST_MORNING_FILE" ]; then
            echo "WARNING: $LAST_MORNING_FILE not found — morning may never have run."
            ALERT_MSG="⚠️ Quant Lab watchdog: \`state/last_morning.json\` missing. Morning run has never completed or file was not committed."
          else
            # Parse the timestamp using python3 as a portable fallback (jq may not be installed)
            if command -v jq &> /dev/null; then
              LAST_TS=$(jq -r '.timestamp' "$LAST_MORNING_FILE")
              LAST_STATUS=$(jq -r '.status' "$LAST_MORNING_FILE")
            else
              LAST_TS=$(python3 -c "import json,sys; d=json.load(open('$LAST_MORNING_FILE')); print(d['timestamp'])")
              LAST_STATUS=$(python3 -c "import json,sys; d=json.load(open('$LAST_MORNING_FILE')); print(d['status'])")
            fi

            echo "Last morning timestamp: $LAST_TS  status: $LAST_STATUS"

            # Compute age in seconds
            LAST_EPOCH=$(python3 -c "
          from datetime import datetime, timezone
          ts = '$LAST_TS'
          dt = datetime.fromisoformat(ts.replace('Z', '+00:00'))
          print(int(dt.timestamp()))
          ")
            NOW_EPOCH=$(date +%s)
            AGE_SECONDS=$(( NOW_EPOCH - LAST_EPOCH ))
            AGE_HOURS=$(( AGE_SECONDS / 3600 ))

            echo "Age: ${AGE_SECONDS}s (${AGE_HOURS}h)"

            # Alert if > 24 hours old
            if [ "$AGE_SECONDS" -gt 86400 ]; then
              ALERT_MSG="⚠️ Quant Lab watchdog: Morning run is ${AGE_HOURS}h old (last: \`$LAST_TS\`, status: \`$LAST_STATUS\`). Check GitHub Actions for failures."
            else
              echo "Morning run is recent (${AGE_HOURS}h old). No alert needed."
              exit 0
            fi
          fi

          # Post to Discord if webhook is configured
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$ALERT_MSG\"}"
            echo "Discord alert sent."
          else
            echo "No DISCORD_WEBHOOK secret configured; skipping notification."
            echo "Alert message: $ALERT_MSG"
          fi
